data_dir: "./data/project/yambda"
semantic_ids_path: "./results/project/original_tiny/sids.parquet"
test_interactions_path: "seqrec_test_sample_interactions.parquet"
device: "cuda"
summary_json: "./results/project/original_tiny/seqrec_summary.json"

budget_mode: "tokens"
history_budget: 64
flatten_codebooks: false
append_unique_token: true

train:
  ideal_batch_size_tokens: 4096
  device_batch_size: 8
  depth: 2
  adam_lr: 0.008
  muon_lr: 0.06
  weight_decay: 0.0
  warmdown_ratio: 0.45
  final_lr_frac: 0.1
  tf32: true
  matmul_precision: "high"
  compile: true
  compile_dynamic: false
  grad_clip: 0.0

eval:
  beam_size: 5
  max_batch_tokens: 2048
  max_batch_users: 128
  max_candidates: 20
  per_code_max_items: 5
  k_list: [10]
  catalog_size: null

min_item_count: 16
pop_k: 5000
user_start_token: 0
sep_token: 1
num_special_tokens: 2
seed: 42
target_col: "target"
time_col: "timestamp"
user_col: "user_id"
item_col: "item_id"
